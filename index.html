<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaziantep Takograf</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #08090c;
  color: white;
}

/* BALONCUK */
.bubbles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}
.bubbles span {
  position: absolute;
  bottom: -100px;
  background: rgba(255,140,0,0.2);
  border-radius: 50%;
  animation: rise linear infinite;
}
@keyframes rise {
  0% {transform: translateY(0); opacity:0;}
  30% {opacity:0.6;}
  100% {transform: translateY(-110vh); opacity:0;}
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#00000080;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img {
  width:45px;
}

.btn {
  background:#ff7b00;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px;
}

.hero img {
  width:500px;
  border-radius:20px;
}

.cards {
  display:flex;
  gap:20px;
  padding:40px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:20px;
  flex:1;
}

.vehicle-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:40px;
}

.vehicle {
  background:#111;
  border-radius:20px;
  overflow:hidden;
}
.vehicle img {
  width:100%;
  height:200px;
  object-fit:cover;
}
.vehicle h3 {
  padding:10px;
}

footer {
  padding:30px;
  text-align:center;
  background:#000;
}
</style>
</head>

<body>

<div class="bubbles" id="bubbles"></div>

<header>
  <div class="logo">
    <img src="https://i.hizliresim.com/lmbf08c.png">
    <div>
      <b>GAZİANTEP TAKOGRAF</b><br>
      <small>Takograf Hizmetleri</small>
    </div>
  </div>

  <a class="btn" href="https://wa.me/905067320285">WhatsApp</a>
</header>

<section class="hero">
  <div>
    <h1>Tır ve Kamyonlar İçin<br>Takograf Hizmeti</h1>
    <p>Takograf tamiri, bakım ve teknik destek hizmeti.</p>
  </div>

  <img src="https://polonyanakliyat.com/wp-content/uploads/2024/04/takograflarin-degistirilmesi-polonya-nakliyat.jpg">
</section>

<div class="cards">
  <div class="card"><b>Takograf Tamiri</b><br>Hızlı müdahale</div>
  <div class="card"><b>Bakım</b><br>Düzenli kontrol</div>
  <div class="card"><b>Destek</b><br>Kolay ulaşım</div>
</div>

<div class="vehicle-grid">
  <div class="vehicle">
    <img src="https://d2e5b8shawuel2.cloudfront.net/vehicle/301381/hlv/original.jpg">
    <h3>Mercedes Actros</h3>
  </div>
  <div class="vehicle">
    <img src="https://www.classtrucks.com/wp-content/uploads/2024/12/DSC04972-Edit-scaled-1.jpg">
    <h3>Volvo FH</h3>
  </div>
  <div class="vehicle">
    <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7">
    <h3>Scania R</h3>
  </div>
</div>

<footer>
📍 Gaziantep Şehitkamil<br>
📞 0506 732 02 85
</footer>

<script>
// baloncuk oluştur
const bubbles = document.getElementById("bubbles");
for(let i=0;i<25;i++){
  let span=document.createElement("span");
  span.style.left=Math.random()*100+"%";
  span.style.width=span.style.height=(Math.random()*20+10)+"px";
  span.style.animationDuration=(Math.random()*10+5)+"s";
  bubbles.appendChild(span);
}
</script>

</body>
</html>
