<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaziantep Takograf</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#08090c;
  color:white;
}

/* BALONCUK */
.bubbles {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}
.bubbles span{
  position:absolute;
  bottom:-100px;
  width:15px;
  height:15px;
  background:rgba(255,120,0,0.2);
  border-radius:50%;
  animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(0);opacity:0;}
  30%{opacity:.6;}
  100%{transform:translateY(-110vh);opacity:0;}
}

header{
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:#00000080;
}

.logo{
  display:flex;
  gap:10px;
  align-items:center;
}

.logo img{
  width:50px;
}

.btn{
  background:#ff7b00;
  padding:10px 20px;
  border-radius:10px;
  text-decoration:none;
  color:black;
  font-weight:bold;
}

.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:80px;
}

.hero img{
  width:500px;
  border-radius:20px;
}

.cards{
  display:flex;
  gap:20px;
  padding:40px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:20px;
  flex:1;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:40px;
}

.vehicle{
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.vehicle img{
  width:100%;
  height:200px;
  object-fit:cover;
}

footer{
  text-align:center;
  padding:30px;
  background:#000;
}
</style>
</head>

<body>

<div class="bubbles" id="bubbles"></div>

<header>
  <div class="logo">
    <img src="https://i.hizliresim.com/lmbf08c.png">
    <div>
      <b>GAZİANTEP TAKOGRAF</b><br>
      <small>Takograf Hizmetleri</small>
    </div>
  </div>

  <a class="btn" href="https://wa.me/905067320285">WhatsApp</a>
</header>

<section class="hero">
  <div>
    <h1>Tır ve Kamyonlar İçin Takograf Hizmeti</h1>
    <p>Takograf tamiri, bakım ve teknik destek.</p>
  </div>

  <img src="https://polonyanakliyat.com/wp-content/uploads/2024/04/takograflarin-degistirilmesi-polonya-nakliyat.jpg">
</section>

<div class="cards">
  <div class="card">Takograf Tamiri</div>
  <div class="card">Bakım</div>
  <div class="card">Destek</div>
</div>

<div class="grid">
  <div class="vehicle">
    <img src="https://d2e5b8shawuel2.cloudfront.net/vehicle/301381/hlv/original.jpg">
    <h3>Mercedes Actros</h3>
  </div>
  <div class="vehicle">
    <img src="https://www.classtrucks.com/wp-content/uploads/2024/12/DSC04972-Edit-scaled-1.jpg">
    <h3>Volvo FH</h3>
  </div>
  <div class="vehicle">
    <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7">
    <h3>Scania</h3>
  </div>
</div>

<footer>
📍 Gaziantep Şehitkamil<br>
📞 0506 732 02 85
</footer>

<script>
const b=document.getElementById("bubbles");
for(let i=0;i<25;i++){
 let s=document.createElement("span");
 s.style.left=Math.random()*100+"%";
 s.style.width=s.style.height=(Math.random()*20+10)+"px";
 s.style.animationDuration=(Math.random()*10+5)+"s";
 b.appendChild(s);
}
</script>

</body>
</html>
